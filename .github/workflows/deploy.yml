name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; cancel older queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # `npm ci` (strict) fails here: the lockfile is generated on macOS and
      # omits Linux-only optional peer deps of @napi-rs/wasm-runtime
      # (@emnapi/core, @emnapi/runtime) — a known npm cross-platform lockfile
      # gap. `npm install` tops up those entries instead of erroring.
      - run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Project page is served from /<repo>/. For a user/org page
          # (repo named <user>.github.io) or a custom domain, change this to '/'.
          VITE_BASE: /${{ github.event.repository.name }}/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
